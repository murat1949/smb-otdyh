<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1E3D2F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SMB Otdyh">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>SMB Otdyh — Сосновый бор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
 --ink:#20302A; --muted:#5C6F63; --paper:#F2F4EC; --forest-deep:#12251D;
 --forest:#1E3D2F; --forest-mid:#33574A; --amber:#C9922E; --amber-deep:#7C5615;
 --border:#E3E7DA;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Manrope",-apple-system,sans-serif;background:var(--paper);color:var(--ink)}
.phone{max-width:420px;margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column}
.top{padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:9px}
.brand-mark{width:34px;height:34px;border-radius:9px;background:var(--forest);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-family:"Fraunces",serif;font-weight:600;font-size:16px;line-height:1.1}
.brand-sub{font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:700}
.mockup-wrap{padding:18px 26px 0;text-align:center}
.mockup-frame{position:relative;display:inline-block;width:100%;max-width:320px}
.mockup-frame img{width:100%;height:auto;display:block;filter:drop-shadow(0 24px 40px rgba(18,37,29,.28))}
.mockup-cta{position:absolute;left:14.2%;width:74.4%;top:40.9%;height:4.4%;border-radius:40px;cursor:pointer;background:var(--amber);color:var(--forest-deep);display:flex;align-items:center;justify-content:center;gap:6px;font-family:"Manrope",sans-serif;font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-decoration:none;box-shadow:0 6px 16px rgba(201,146,46,.45)}
.mockup-cta svg{flex-shrink:0;width:16px;height:16px}
.mockup-cta:active{background:var(--amber-deep);color:#fff}
.install-wrap{padding:14px 22px 4px}
.install-btn{width:100%;border:0;border-radius:14px;padding:14px 16px;background:var(--forest);color:#fff;font:700 14px "Manrope",sans-serif;display:none;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 24px rgba(18,37,29,.18);cursor:pointer}
.install-btn.show{display:flex}
.install-btn:active{transform:translateY(1px)}
.install-help{display:none;margin:9px 0 0;text-align:center;color:var(--muted);font-size:11.5px;line-height:1.45}
.install-help.show{display:block}
.icon-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:4px 22px 0}
.icon-item{text-align:center;text-decoration:none;color:var(--ink)}
.icon-circle{width:52px;height:52px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;color:var(--forest)}
.icon-item span{font-size:11.5px;font-weight:600;color:var(--muted)}
.footer-tag{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:7px;padding:24px 22px 28px;font-size:12.5px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="phone">
 <div class="top">
  <div class="brand">
   <div class="brand-mark">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
   </div>
   <div><div class="brand-name">SMB Otdyh</div><div class="brand-sub">Центр управления</div></div>
  </div>
 </div>

 <div class="hero-text" style="padding-top:14px">
  <p style="font-size:12.5px;color:var(--muted);margin:0;text-align:center">База отдыха «Сосновый бор»</p>
 </div>

 <div class="mockup-wrap">
  <div class="mockup-frame">
   <img src="brand-hero.jpg" alt="SMB Otdyh — Ваша база отдыха под контролем 24/7">
   <a class="mockup-cta" href="dashboard.html" aria-label="Открыть центр управления">
    Открыть дашборд
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
   </a>
  </div>
 </div>

 <div class="install-wrap">
  <button id="installApp" class="install-btn" type="button" aria-label="Установить приложение на телефон">
   <span>📲</span><span>Установить на телефон</span>
  </button>
  <p id="installHelp" class="install-help"></p>
 </div>

 <div class="icon-row">
  <a class="icon-item" href="dashboard.html">
   <div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg></div><span>Дашборд</span>
  </a>
  <a class="icon-item" href="admin.html?tab=booking">
   <div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16M8 3v4M16 3v4"/></svg></div><span>Брони</span>
  </a>
  <a class="icon-item" href="admin.html?tab=finance">
   <div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><span>Финансы</span>
  </a>
  <a class="icon-item" href="admin.html?tab=settings">
   <div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg></div><span>Алерты</span>
  </a>
 </div>

 <div class="footer-tag">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/></svg>
  Все показатели под контролем — из любой точки мира
 </div>
</div>
<script src="pwa-install.js"></script>
</body>
</html>
