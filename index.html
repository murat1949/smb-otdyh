<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMB Otdyh — Сосновый бор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #20302A;
  --muted: #5C6F63;
  --paper: #F2F4EC;
  --forest-deep: #12251D;
  --forest: #1E3D2F;
  --forest-mid: #33574A;
  --amber: #C9922E;
  --amber-deep: #7C5615;
  --border: #E3E7DA;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", -apple-system, sans-serif;
  background: var(--paper);
  color: var(--ink);
}
.phone { max-width: 420px; margin: 0 auto; min-height: 100vh; background: var(--paper); display: flex; flex-direction: column; }

.top { padding: 22px 22px 0; display: flex; align-items: center; justify-content: space-between; }
.brand { display: flex; align-items: center; gap: 9px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 9px; background: var(--forest);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-family: "Fraunces", serif; font-weight: 600; font-size: 15px; line-height: 1.1; }
.brand-sub { font-size: 9.5px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; font-weight: 700; }

.hero-text { padding: 26px 22px 0; }
.hero-text h1 {
  font-family: "Fraunces", serif; font-weight: 600; font-size: 30px; line-height: 1.15;
  margin: 0; color: var(--forest-deep);
}
.hero-text h1 em { font-style: italic; color: var(--amber-deep); }
.hero-text p { font-size: 14px; color: var(--muted); line-height: 1.55; margin: 12px 0 0; max-width: 320px; }

.cta {
  margin: 20px 22px 0;
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--forest); color: #fff; text-decoration: none;
  padding: 13px 18px; border-radius: 12px; font-size: 14px; font-weight: 700;
  width: fit-content;
}
.cta svg { flex-shrink: 0; }

.photo-wrap {
  margin: 24px 0 0;
  position: relative;
  height: 260px;
  overflow: hidden;
}
.photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-fade {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(18,37,29,0) 55%, var(--paper) 100%);
}

.icon-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 4px 22px 0; }
.icon-item { text-align: center; text-decoration: none; color: var(--ink); }
.icon-circle {
  width: 52px; height: 52px; border-radius: 50%; background: #fff; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; color: var(--forest);
}
.icon-item span { font-size: 10.5px; font-weight: 600; color: var(--muted); }

.footer-tag {
  margin-top: auto;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 24px 22px 28px; font-size: 11.5px; color: var(--muted); text-align: center;
}
</style>
</head>
<body>
<div class="phone">

<div class="top">
<div class="brand">
<div class="brand-mark">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
</div>
<div>
<div class="brand-name">SMB Otdyh</div>
<div class="brand-sub">Центр управления</div>
</div>
</div>
</div>

<div class="hero-text">
<h1>Ваша база отдыха<br>под контролем <em>24/7</em></h1>
<p>Заявки, брони, дебиторка и выручка — в одном месте. Алерты приходят в Telegram сами, отчёт — по кнопке.</p>
</div>

<a class="cta" href="dashboard.html">
Открыть центр управления
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
</a>

<div class="photo-wrap">
<img src="cover-photo.jpg" alt="База отдыха «Сосновый бор»">
<div class="photo-fade"></div>
</div>

<div class="icon-row">
<a class="icon-item" href="dashboard.html">
<div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg></div>
<span>Дашборд</span>
</a>
<a class="icon-item" href="admin.html?tab=booking">
<div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16M8 3v4M16 3v4"/></svg></div>
<span>Брони</span>
</a>
<a class="icon-item" href="admin.html?tab=finance">
<div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
<span>Финансы</span>
</a>
<a class="icon-item" href="admin.html?tab=settings">
<div class="icon-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg></div>
<span>Алерты</span>
</a>
</div>

<div class="footer-tag">
<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/></svg>
Все показатели под контролем — из любой точки мира
</div>

</div>
</body>
</html>
