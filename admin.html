<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMB Otdyh — Ввод данных</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #20302A;
  --muted: #64766A;
  --paper: #F2F4EC;
  --card: #FFFFFF;
  --forest-deep: #12251D;
  --forest: #1E3D2F;
  --forest-mid: #33574A;
  --sage-tint: #E6EBDD;
  --amber: #C9922E;
  --amber-deep: #7C5615;
  --amber-tint: #F6E8CB;
  --clay: #A23E2E;
  --clay-tint: #F5E1DC;
  --success: #3F7A54;
  --success-tint: #E1EEE2;
  --border: #E3E7DA;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", -apple-system, sans-serif;
  background: var(--paper);
  color: var(--ink);
}
.phone { max-width: 420px; margin: 0 auto; min-height: 100vh; background: var(--paper); box-shadow: 0 0 50px rgba(18,37,29,0.10); }

header { position: relative; background: var(--forest-deep); padding: 20px 20px 30px; overflow: hidden; }
header h1 {
  font-family: "Fraunces", serif; font-weight: 600; font-style: italic;
  font-size: 19px; margin: 0; color: #F6F3EA; position: relative; z-index: 2;
}
header .sub { font-size: 11.5px; color: #A9BDAE; margin-top: 3px; position: relative; z-index: 2; }
.ridge { position: absolute; left: 0; right: 0; bottom: -1px; width: 100%; height: 30px; display: block; }

.back {
  display: flex; align-items: center; gap: 5px; margin: 14px 18px 0;
  font-size: 12px; color: var(--muted); text-decoration: none; font-weight: 600;
}

.tabs { display: flex; margin: 14px 18px 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 3px; }
.tab { flex: 1; text-align: center; padding: 9px 2px; font-size: 10px; color: var(--muted); border-radius: 9px; cursor: pointer; font-weight: 600; }
.tab.active { background: var(--forest); color: #fff; }

form { padding: 18px; display: none; }
form.active { display: block; }
.field { margin-bottom: 15px; }
.field label { display: block; font-size: 11.5px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
.field input, .field select {
  width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; background: var(--card); color: var(--ink); font-family: "Manrope", sans-serif;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--forest-mid); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

button.submit {
  width: 100%; padding: 14px; background: var(--forest); color: #fff;
  border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px;
  font-family: "Manrope", sans-serif;
}
button.submit:active { background: var(--forest-deep); }

.msg { margin: 0 18px 16px; padding: 11px 13px; border-radius: 10px; font-size: 13px; display: none; font-weight: 600; }
.msg.success { background: var(--success-tint); color: var(--success); display: block; }
.msg.error { background: var(--clay-tint); color: #7A2E21; display: block; }

.hint { font-size: 11px; color: var(--muted); margin: -9px 0 15px; }
</style>
</head>
<body>
<div class="phone">
<header>
<h1>Ввод данных</h1>
<div class="sub">База отдыха «Сосновый бор»</div>
<svg class="ridge" viewBox="0 0 400 40" preserveAspectRatio="none">
<polygon points="0,40 0,22 20,4 40,22 60,8 80,26 100,10 120,28 140,14 160,30 180,12 200,26 220,6 240,24 260,16 280,32 300,18 320,28 340,10 360,24 380,14 400,26 400,40" fill="#33574A" opacity="0.55"/>
<polygon points="0,40 0,30 15,16 30,30 45,20 60,32 75,18 90,30 105,22 120,34 135,20 150,30 165,24 180,34 195,22 210,30 225,26 240,34 255,20 270,30 285,24 300,32 315,22 330,30 345,26 360,34 375,24 390,30 400,32 400,40" fill="#F2F4EC"/>
</svg>
</header>

<a class="back" href="index.html">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
Назад к дашборду
</a>

<div class="tabs">
<div class="tab active" data-tab="lead">Заявка</div>
<div class="tab" data-tab="negotiation">Переговоры</div>
<div class="tab" data-tab="booking">Бронь</div>
<div class="tab" data-tab="finance">Финансы</div>
<div class="tab" data-tab="settings">Настройки</div>
</div>

<div class="msg" id="msg"></div>

<form id="form-lead" class="active">
<div class="field">
<label>Гость / компания *</label>
<input type="text" id="l-guest" required placeholder="Например: Ержанов А.">
</div>
<div class="row2">
<div class="field">
<label>Заезд</label>
<input type="date" id="l-checkin">
</div>
<div class="field">
<label>Выезд</label>
<input type="date" id="l-checkout">
</div>
</div>
<div class="field">
<label>Домик / номер</label>
<select id="l-property"><option value="">— не выбрано —</option></select>
</div>
<div class="field">
<label>Статус</label>
<select id="l-status">
<option value="new">Новая</option>
<option value="in_progress">В работе</option>
<option value="booked">Забронировано</option>
<option value="rejected">Отказ</option>
</select>
</div>
<button type="submit" class="submit">Сохранить заявку</button>
</form>

<form id="form-booking">
<div class="field">
<label>Гость / компания *</label>
<input type="text" id="b-guest" required placeholder="Например: Смирнова К.">
</div>
<div class="field">
<label>Домик / номер *</label>
<select id="b-property" required><option value="">— выбрать —</option></select>
</div>
<div class="row2">
<div class="field">
<label>Заезд *</label>
<input type="date" id="b-checkin" required>
</div>
<div class="field">
<label>Выезд *</label>
<input type="date" id="b-checkout" required>
</div>
</div>
<div class="row2">
<div class="field">
<label>Сумма брони, ₸ *</label>
<input type="number" id="b-amount" required placeholder="0">
</div>
<div class="field">
<label>Доп. услуги, ₸</label>
<input type="number" id="b-extra" placeholder="0">
</div>
</div>
<div class="row2">
<div class="field">
<label>Оплачено, ₸</label>
<input type="number" id="b-paid" placeholder="0">
</div>
<div class="field">
<label>Статус</label>
<select id="b-status">
<option value="booked">Забронирован</option>
<option value="checked_in">Заехал</option>
<option value="checked_out">Выехал</option>
<option value="cancelled">Отменён</option>
</select>
</div>
</div>
<button type="submit" class="submit">Сохранить бронь</button>
</form>

<form id="form-negotiation">
<div class="field">
<label>По какой заявке *</label>
<select id="n-lead" required><option value="">— выбрать заявку —</option></select>
</div>
<div class="field">
<label>Результат *</label>
<select id="n-result" required>
<option value="interested">Интерес</option>
<option value="reviewing">На рассмотрении</option>
<option value="agreed">Согласование</option>
<option value="rejected">Отказ</option>
<option value="done">Выполнен</option>
</select>
</div>
<div class="field">
<label>Следующий шаг</label>
<input type="text" id="n-next-step" placeholder="Например: перезвонить">
</div>
<div class="field">
<label>Дата следующего контакта</label>
<input type="date" id="n-next-date">
</div>
<div class="field">
<label>Комментарий</label>
<input type="text" id="n-comment" placeholder="Детали разговора">
</div>
<button type="submit" class="submit">Сохранить переговоры</button>
</form>

<form id="form-finance">
<div class="field">
<label>Дата *</label>
<input type="date" id="fi-date" required>
</div>
<div class="row2">
<div class="field">
<label>Выручка, ₸</label>
<input type="number" id="fi-revenue" placeholder="0">
</div>
<div class="field">
<label>ЗП персонала, ₸</label>
<input type="number" id="fi-staff" placeholder="0">
</div>
</div>
<div class="row2">
<div class="field">
<label>Обслуживание, ₸</label>
<input type="number" id="fi-maintenance" placeholder="0">
</div>
<div class="field">
<label>Прочие расходы, ₸</label>
<input type="number" id="fi-other" placeholder="0">
</div>
</div>
<div class="field">
<label>Комментарий</label>
<input type="text" id="fi-comment" placeholder="Пояснение при необходимости">
</div>
<button type="submit" class="submit">Сохранить запись</button>
</form>

<form id="form-settings">
<div class="field">
<label>Порог "Крупная бронь", ₸</label>
<input type="number" id="s-big-booking" placeholder="400000">
</div>
<div class="hint">Если сумма брони больше этого числа — придёт алерт в Telegram</div>
<div class="field">
<label>Порог "Дебиторка", ₸</label>
<input type="number" id="s-debt" placeholder="500000">
</div>
<div class="hint">Если общий долг гостей превысит эту сумму — придёт алерт</div>
<div class="field">
<label>План выручки в месяц, ₸</label>
<input type="number" id="s-revenue-plan" placeholder="4000000">
</div>
<div class="hint">Используется в отчёте (факт / план)</div>
<button type="submit" class="submit">Сохранить настройки</button>
</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://ilfxyvsqintvjbifqxvr.supabase.co";
const SUPABASE_KEY = "sb_publishable_GEl1zhHAxT_i8zU2F86cOA_-G6n7uBH";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("form").forEach(f => f.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("form-" + tab.dataset.tab).classList.add("active");
    document.getElementById("msg").style.display = "none";
  });
});

const params = new URLSearchParams(location.search);
const requestedTab = params.get("tab");
if (requestedTab) {
  const el = document.querySelector(`[data-tab="${requestedTab}"]`);
  if (el) el.click();
}

function showMsg(text, ok) {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.className = "msg " + (ok ? "success" : "error");
}

async function loadProperties() {
  const { data, error } = await sb.from("otdyh_properties").select("id, name").eq("is_active", true).order("name");
  if (error || !data) return;
  const opts = data.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  document.getElementById("l-property").insertAdjacentHTML("beforeend", opts);
  document.getElementById("b-property").insertAdjacentHTML("beforeend", opts);
}
loadProperties();

document.getElementById("form-lead").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    guest_name: document.getElementById("l-guest").value,
    check_in: document.getElementById("l-checkin").value || null,
    check_out: document.getElementById("l-checkout").value || null,
    property_id: document.getElementById("l-property").value || null,
    status: document.getElementById("l-status").value,
  };
  const { error } = await sb.from("otdyh_leads").insert(payload);
  if (error) { showMsg("Ошибка: " + error.message, false); return; }
  showMsg("Заявка сохранена", true);
  e.target.reset();
});

document.getElementById("form-booking").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    guest_name: document.getElementById("b-guest").value,
    property_id: document.getElementById("b-property").value,
    check_in: document.getElementById("b-checkin").value,
    check_out: document.getElementById("b-checkout").value,
    total_amount: Number(document.getElementById("b-amount").value || 0),
    extra_services_amount: Number(document.getElementById("b-extra").value || 0),
    paid_total: Number(document.getElementById("b-paid").value || 0),
    status: document.getElementById("b-status").value,
  };
  const { error } = await sb.from("otdyh_bookings").insert(payload);
  if (error) { showMsg("Ошибка: " + error.message, false); return; }
  showMsg("Бронь сохранена", true);
  e.target.reset();
});

async function loadLeads() {
  const { data, error } = await sb.from("otdyh_leads")
    .select("id, guest_name, created_at")
    .order("created_at", { ascending: false })
    .limit(30);
  if (error || !data) return;
  const opts = data.map(l => {
    const d = new Date(l.created_at).toLocaleDateString("ru-RU");
    return `<option value="${l.id}">${l.guest_name} (${d})</option>`;
  }).join("");
  document.getElementById("n-lead").insertAdjacentHTML("beforeend", opts);
}
loadLeads();

document.getElementById("form-negotiation").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    lead_id: document.getElementById("n-lead").value,
    result: document.getElementById("n-result").value,
    next_step: document.getElementById("n-next-step").value || null,
    next_contact_date: document.getElementById("n-next-date").value || null,
    comment: document.getElementById("n-comment").value || null,
  };
  const { error } = await sb.from("otdyh_negotiations").insert(payload);
  if (error) { showMsg("Ошибка: " + error.message, false); return; }
  showMsg("Переговоры сохранены", true);
  e.target.reset();
});

document.getElementById("form-finance").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    entry_date: document.getElementById("fi-date").value,
    revenue: Number(document.getElementById("fi-revenue").value || 0),
    staff_cost: Number(document.getElementById("fi-staff").value || 0),
    maintenance_cost: Number(document.getElementById("fi-maintenance").value || 0),
    other_cost: Number(document.getElementById("fi-other").value || 0),
    comment: document.getElementById("fi-comment").value || null,
  };
  const { error } = await sb.from("otdyh_finance").insert(payload);
  if (error) { showMsg("Ошибка: " + error.message, false); return; }
  showMsg("Финансовая запись сохранена", true);
  e.target.reset();
});

async function loadSettings() {
  const { data, error } = await sb.from("otdyh_settings").select("key, value");
  if (error || !data) return;
  const map = {};
  data.forEach(row => { map[row.key] = row.value; });
  if (map.big_booking_threshold !== undefined) document.getElementById("s-big-booking").value = map.big_booking_threshold;
  if (map.debt_threshold !== undefined) document.getElementById("s-debt").value = map.debt_threshold;
  if (map.monthly_revenue_plan !== undefined) document.getElementById("s-revenue-plan").value = map.monthly_revenue_plan;
}
loadSettings();

document.getElementById("form-settings").addEventListener("submit", async (e) => {
  e.preventDefault();
  const updates = [
    { key: "big_booking_threshold", value: Number(document.getElementById("s-big-booking").value || 0) },
    { key: "debt_threshold", value: Number(document.getElementById("s-debt").value || 0) },
    { key: "monthly_revenue_plan", value: Number(document.getElementById("s-revenue-plan").value || 0) },
  ];
  for (const u of updates) {
    const { error } = await sb.from("otdyh_settings").update({ value: u.value }).eq("key", u.key);
    if (error) { showMsg("Ошибка: " + error.message, false); return; }
  }
  showMsg("Настройки сохранены", true);
});
</script>
</body>
</html>
